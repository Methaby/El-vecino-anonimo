    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #030712; color: #f3f4f6; touch-action: manipulation; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .glass { background: rgba(31, 41, 55, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        .no-select { user-select: none; -webkit-user-select: none; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-view { animation: fadeIn 0.25s ease-out forwards; }
        .switch-input:checked + .switch-label { background-color: #ef4444; }
        .switch-input:checked + .switch-label .switch-dot { transform: translateX(1.25rem); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 no-select">
    <div id="app" class="w-full max-w-md bg-gray-900 rounded-[3rem] shadow-2xl overflow-hidden border border-gray-800 h-[92vh] flex flex-col relative">
        <header class="p-6 text-center bg-gray-900/95 border-b border-gray-800/50">
            <h1 class="text-2xl font-900 tracking-tighter uppercase italic leading-none">EL VECINO <span class="text-red-500 block text-3xl">ANÓNIMO</span></h1>
        </header>
        <main id="main-content" class="flex-1 p-6 flex flex-col overflow-y-auto"></main>
        <nav id="bottom-nav" class="p-4 flex justify-around border-t border-gray-800 bg-gray-950/80 backdrop-blur-md">
            <button onclick="renderSetup()" class="flex flex-col items-center gap-1 opacity-70"><span class="text-xl">👥</span><span class="text-[9px] font-bold uppercase">Jugar</span></button>
            <button onclick="renderWordManager()" class="flex flex-col items-center gap-1 opacity-70"><span class="text-xl">📖</span><span class="text-[9px] font-bold uppercase">Pack</span></button>
            <button onclick="resetApp()" class="flex flex-col items-center gap-1 opacity-70 text-red-500"><span class="text-xl">🔄</span><span class="text-[9px] font-bold uppercase">Reset</span></button>
        </nav>
    </div>

    <script>
        const RAW_DATA = {
            "Cine y Series": ["Breaking Bad", "Stranger Things", "Harry Potter", "Star Wars", "Titanic", "Avatar", "El Padrino", "Toy Story", "Shrek", "Juego de Tronos", "The Office", "Batman", "Spider-Man", "Inception", "Matrix", "Avengers", "Gladiador", "Pulp Fiction", "El Rey León", "Nemo", "La La Land", "Frozen", "Squid Game", "Money Heist", "Narcos", "Chernobyl", "Dune", "Interstellar", "Joker", "Deadpool", "Mad Max"],
            "Tecnología": ["iPhone", "Samsung", "TikTok", "Instagram", "WhatsApp", "Telegram", "Google", "Facebook", "Twitter", "ChatGPT", "Bitcoin", "PlayStation", "Xbox", "Nintendo Switch", "MacBook", "Tesla", "Spotify", "Netflix", "Disney+", "Zoom", "Alexa", "Wifi", "Amazon", "Linux", "Windows", "Metaverso", "NFT", "Android"],
            "Comida y Bebida": ["Pizza", "Sushi", "Hamburguesa", "Taco", "Paella", "Ramen", "Pasta", "Burrito", "Ensalada", "Filete", "Chocolate", "Helado", "Café", "Té", "Vino", "Cerveza", "Coca Cola", "Pepsi", "Yogur", "Queso", "Croissant", "Donut", "Pancakes", "Hot Dog", "Empanada", "Hummus", "Lasaña", "Risotto", "Ceviche", "Sandwich"],
            "Deportes": ["Fútbol", "Baloncesto", "Tenis", "Béisbol", "Fórmula 1", "MotoGP", "Golf", "Rugby", "Natación", "Atletismo", "Boxeo", "UFC", "Ciclismo", "Surf", "Esquí", "Ajedrez", "Yoga", "Voleibol", "Ping Pong", "Pádel", "Hockey", "Remo", "Escalada", "Senderismo", "Maratón"],
            "Viajes": ["España", "México", "Japón", "Francia", "Italia", "USA", "Brasil", "China", "Egipto", "Londres", "París", "Nueva York", "Tokio", "Roma", "Barcelona", "Madrid", "Berlín", "Dubái", "Playa", "Montaña", "Desierto", "Selva", "Crucero", "Avión", "Tren", "Hotel", "Museo", "Isla", "Volcán"],
            "Animales": ["Perro", "Gato", "Caballo", "Elefante", "León", "Tigre", "Lobo", "Oso", "Delfín", "Ballena", "Tiburón", "Águila", "Búho", "Serpiente", "Cocodrilo", "Rana", "Mariposa", "Abeja", "Hormiga", "Cebra", "Jirafa", "Canguro", "Pingüino", "Gorila", "Mono", "Vaca", "Cerdo", "Oveja", "Conejo"]
        };

        function generateMassiveLibrary() {
            let pairs = [];
            for (let cat in RAW_DATA) {
                let items = RAW_DATA[cat];
                for (let i = 0; i < items.length; i++) {
                    for (let j = i + 1; j < items.length; j++) {
                        pairs.push({ a: items[i], b: items[j], hint: cat });
                        pairs.push({ a: items[j], b: items[i], hint: cat });
                    }
                }
            }
            return pairs;
        }

        let gameData = {
            players: JSON.parse(localStorage.getItem('va-players')) || [],
            scores: JSON.parse(localStorage.getItem('va-scores')) || {},
            wordPairs: JSON.parse(localStorage.getItem('va-custom')) || generateMassiveLibrary(),
            settings: { avatar: 'MALE', vecinoInvisible: JSON.parse(localStorage.getItem('va-invisible')) || false },
            current: null
        };

        const AVATARS = {
            MALE: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" class="w-full h-full text-blue-400" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 10-16 0" stroke-linecap="round"/></svg>`,
            FEMALE: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" class="w-full h-full text-pink-400" stroke-width="2"><path d="M12 11c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z"/><path d="M12 13c-4 0-7 3-7 7v1h14v-1c0-4-3-7-7-7z"/></svg>`
        };

        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.setValueAtTime(type === 'fire' ? 800 : 200, ctx.currentTime);
                o.frequency.exponentialRampToValueAtTime(type === 'fire' ? 1200 : 50, ctx.currentTime + 0.3);
                g.gain.setValueAtTime(0.1, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                o.start(); o.stop(ctx.currentTime + 0.3);
            } catch(e) {}
        }

        function save() {
            localStorage.setItem('va-players', JSON.stringify(gameData.players));
            localStorage.setItem('va-scores', JSON.stringify(gameData.scores));
            localStorage.setItem('va-custom', JSON.stringify(gameData.wordPairs));
            localStorage.setItem('va-invisible', JSON.stringify(gameData.settings.vecinoInvisible));
        }

        function renderSetup() {
            document.getElementById('bottom-nav').style.display = 'flex';
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <div class="animate-view space-y-6 pb-10">
                    <div class="flex flex-col items-center gap-4">
                        <div class="flex gap-4">
                            <button onclick="gameData.settings.avatar='MALE'; renderSetup()" class="w-14 h-14 p-3 rounded-2xl glass ${gameData.settings.avatar==='MALE'?'ring-2 ring-blue-500':''}">
                                ${AVATARS.MALE}
                            </button>
                            <button onclick="gameData.settings.avatar='FEMALE'; renderSetup()" class="w-14 h-14 p-3 rounded-2xl glass ${gameData.settings.avatar==='FEMALE'?'ring-2 ring-pink-500':''}">
                                ${AVATARS.FEMALE}
                            </button>
                        </div>
                        <div class="flex gap-2 w-full">
                            <input type="text" id="p-name" placeholder="Nombre..." class="flex-1 bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-white">
                            <button onclick="addPlayer()" class="bg-white text-black w-14 rounded-2xl font-black text-2xl">+</button>
                        </div>
                    </div>
                    <div class="glass p-5 rounded-[2rem] space-y-4">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-black uppercase text-gray-400">Modo Vecino Ciego</span>
                            <div class="relative inline-block w-10 h-5">
                                <input type="checkbox" id="inv-toggle" class="switch-input hidden" ${gameData.settings.vecinoInvisible?'checked':''} onchange="gameData.settings.vecinoInvisible=this.checked; save()">
                                <label for="inv-toggle" class="switch-label block w-full h-full bg-gray-700 rounded-full cursor-pointer transition-colors">
                                    <span class="switch-dot absolute left-0 top-0 w-5 h-5 bg-white rounded-full transition-transform ${gameData.settings.vecinoInvisible?'translate-x-5':''}"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-2 max-h-48 overflow-y-auto pr-1">
                        ${gameData.players.map((p, i) => `
                            <div class="flex items-center justify-between glass p-4 rounded-3xl animate-view">
                                <div class="flex items-center gap-3">
                                    <div class="w-6 h-6">${AVATARS[p.avatar]}</div>
                                    <span class="font-black text-xs uppercase">${p.name}</span>
                                    <span class="text-[8px] bg-red-500/10 text-red-500 px-2 rounded-full font-black">${gameData.scores[p.name] || 0}</span>
                                </div>
                                <button onclick="removePlayer(${i})" class="text-gray-600 text-[10px] font-bold px-2">✕</button>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="startRound()" class="w-full btn-primary py-5 rounded-[2rem] font-black uppercase tracking-widest ${gameData.players.length < 3 ? 'opacity-20' : ''}">Repartir Roles</button>
                </div>
            `;
        }

        function addPlayer() {
            const name = document.getElementById('p-name').value.trim();
            if(name && !gameData.players.find(p => p.name === name)) {
                gameData.players.push({ name, avatar: gameData.settings.avatar });
                if(!gameData.scores[name]) gameData.scores[name] = 0;
                save(); renderSetup();
            }
        }

        function removePlayer(i) { gameData.players.splice(i, 1); save(); renderSetup(); }

        function renderWordManager() {
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <div class="animate-view space-y-4">
                    <h2 class="text-xl font-900 uppercase italic">Custom Packs</h2>
                    <div class="bg-gray-950 p-6 rounded-[2.5rem] border border-gray-800 space-y-3">
                        <input type="text" id="wa" placeholder="Palabra Ciudadano" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-xs text-white">
                        <input type="text" id="wb" placeholder="Palabra Vecino" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-xs text-white">
                        <input type="text" id="wh" placeholder="Categoría" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-xs text-white">
                        <button onclick="addWord()" class="w-full bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase">Añadir</button>
                    </div>
                    <p class="text-center text-[9px] text-gray-500 font-bold uppercase">Total: ${gameData.wordPairs.length} combinaciones</p>
                </div>
            `;
        }

        function addWord() {
            const a = document.getElementById('wa').value.trim();
            const b = document.getElementById('wb').value.trim();
            const h = document.getElementById('wh').value.trim() || 'General';
            if(a && b) { gameData.wordPairs.push({ a, b, hint: h }); save(); renderWordManager(); }
        }

        function startRound() {
            if(gameData.players.length < 3) return;
            document.getElementById('bottom-nav').style.display = 'none';
            const pair = gameData.wordPairs[Math.floor(Math.random() * gameData.wordPairs.length)];
            let roles = gameData.players.map(p => ({ ...p, role: 'CIUDADANO', word: pair.a, color: 'text-blue-500', isAlive: true }));
            const impIdx = Math.floor(Math.random() * roles.length);
            roles[impIdx].role = 'VECINO';
            roles[impIdx].word = gameData.settings.vecinoInvisible ? '???' : pair.b;
            roles[impIdx].color = 'text-red-600';
            gameData.current = { roles, revIdx: 0, revealed: false, hint: pair.hint, target: pair.a.toLowerCase() };
            renderReveal();
        }

        function renderReveal() {
            const content = document.getElementById('main-content');
            const player = gameData.current.roles[gameData.current.revIdx];
            if(!player) { renderVoting(); return; }
            content.innerHTML = `
                <div class="animate-view flex-1 flex flex-col items-center justify-between py-10 text-center">
                    <div class="space-y-4">
                        <div class="w-20 h-20 mx-auto">${AVATARS[player.avatar]}</div>
                        <h2 class="text-3xl font-900 uppercase italic">${player.name}</h2>
                    </div>
                    <div onclick="gameData.current.revealed=!gameData.current.revealed; renderReveal()" class="w-64 h-80 glass rounded-[3.5rem] border-2 border-dashed border-gray-700 flex flex-col items-center justify-center p-8 transition-all active:scale-95">
                        ${gameData.current.revealed ? `
                            <div class="animate-view">
                                <p class="text-[10px] text-gray-500 font-black uppercase mb-4">Palabra Secreta:</p>
                                <p class="text-5xl font-900 italic ${player.color}">${player.word}</p>
                                <div class="mt-10 bg-gray-900/50 px-4 py-2 rounded-full border border-gray-800">
                                    <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Tema: ${gameData.current.hint}</p>
                                </div>
                            </div>
                        ` : `<div class="text-3xl opacity-20">🤫</div><p class="text-[10px] font-black text-gray-600 mt-4 tracking-widest">PULSA PARA VER</p>`}
                    </div>
                    <button onclick="gameData.current.revealed=false; gameData.current.revIdx++; renderReveal()" class="w-full py-6 rounded-[2rem] font-black uppercase tracking-widest ${gameData.current.revealed?'bg-white text-black':'bg-gray-800 text-gray-700 pointer-events-none'}">Entendido</button>
                </div>
            `;
        }

        function renderVoting() {
            const content = document.getElementById('main-content');
            const alive = gameData.current.roles.filter(r => r.isAlive);
            const imp = alive.find(r => r.role === 'VECINO');
            if(!imp) { endGame('CIUDADANOS'); return; }
            if(alive.length <= 2) { endGame('VECINO'); return; }
            content.innerHTML = `
                <div class="animate-view flex-1 flex flex-col">
                    <div class="text-center mb-8">
                        <p class="text-[10px] font-black text-red-500 uppercase tracking-[0.4em]">Votación</p>
                        <h2 class="text-2xl font-black uppercase mt-2">¿Quién es el impostor?</h2>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        ${gameData.current.roles.map((p, i) => `
                            <button onclick="${p.isAlive ? `handleKill(${i})` : ''}" class="glass p-6 rounded-[2.5rem] relative transition-all active:scale-95 ${p.isAlive ? '' : 'opacity-20 grayscale'}">
                                <div class="w-10 h-10 mx-auto mb-3">${AVATARS[p.avatar]}</div>
                                <div class="font-black text-[10px] uppercase truncate">${p.name}</div>
                                ${!p.isAlive ? '<div class="absolute inset-0 flex items-center justify-center text-3xl">💀</div>' : ''}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function handleKill(idx) {
            const p = gameData.current.roles[idx];
            p.isAlive = false;
            if(p.role === 'VECINO') { playSound('fire'); renderLastChance(p); } 
            else { playSound('death'); renderDeathMsg(p); }
        }

        function renderDeathMsg(p) {
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <div class="animate-view flex-1 flex flex-col items-center justify-center text-center space-y-10">
                    <div class="text-9xl">💀</div>
                    <div class="space-y-4 px-4">
                        <h2 class="text-3xl font-900 uppercase">${p.name}</h2>
                        <p class="text-blue-400 font-900 italic text-2xl uppercase">Cálmate. Eliminaste a un ciudadano padrecito</p>
                    </div>
                    <button onclick="renderVoting()" class="w-full bg-white text-black py-6 rounded-[2rem] font-black uppercase shadow-2xl">Continuar</button>
                </div>
            `;
        }

        function renderLastChance(p) {
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <div class="animate-view flex-1 flex flex-col items-center justify-center text-center space-y-8">
                    <div class="text-8xl">🔥</div>
                    <h2 class="text-3xl font-900 uppercase">¡DESCUBIERTO!</h2>
                    <div class="w-full glass p-8 rounded-[3rem] space-y-6">
                        <p class="text-[10px] font-bold text-gray-500 uppercase">Adivina la palabra ciudadana:</p>
                        <input type="text" id="final-guess" class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-4 py-5 text-center text-xl font-black uppercase text-white outline-none">
                        <button onclick="checkFinalGuess()" class="w-full btn-primary py-5 rounded-2xl font-black uppercase">Confirmar</button>
                    </div>
                </div>
            `;
        }

        function checkFinalGuess() {
            const val = document.getElementById('final-guess').value.trim().toLowerCase();
            endGame(val === gameData.current.target ? 'VECINO' : 'CIUDADANOS');
        }

        function endGame(winner) {
            const isVecino = (winner === 'VECINO');
            gameData.current.roles.forEach(r => {
                if(r.role === (isVecino ? 'VECINO' : 'CIUDADANO')) {
                    gameData.scores[r.name] = (gameData.scores[r.name] || 0) + (isVecino ? 3 : 1);
                }
            });
            save();
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <div class="animate-view flex-1 flex flex-col items-center justify-between text-center py-4">
                    <h2 class="text-5xl font-900 italic uppercase">VICTORIA <span class="block text-3xl ${isVecino?'text-red-600':'text-blue-500'}">${winner}</span></h2>
                    <div class="w-full glass rounded-[3rem] p-8 space-y-4 max-h-[350px] overflow-y-auto">
                        ${gameData.players.map(p => ({ name: p.name, score: gameData.scores[p.name] || 0 }))
                            .sort((a,b) => b.score - a.score)
                            .map((p, i) => `
                            <div class="flex justify-between py-2 border-b border-gray-800/30 last:border-0 text-xs font-black uppercase">
                                <span>${i+1}. ${p.name}</span> <span class="text-red-500">${p.score}</span>
                            </div>`).join('')}
                    </div>
                    <button onclick="renderSetup()" class="w-full btn-primary py-6 rounded-[2rem] font-black uppercase">Siguiente Ronda</button>
                </div>
            `;
        }

        function resetApp() { if(confirm('¿Borrar todo?')) { localStorage.clear(); location.reload(); } }
        window.onload = renderSetup;
    </script>
</body>
</html>
